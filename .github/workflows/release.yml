name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          TAG_NAME="${GITHUB_REF_NAME}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"

          if [ "${TAG_NAME#v}" != "${PACKAGE_VERSION}" ]; then
            echo "Tag ${TAG_NAME} does not match package.json version ${PACKAGE_VERSION}" >&2
            exit 1
          fi

          echo "package_version=${PACKAGE_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Run release checks
        run: npm run release:check

      - name: Pack release tarball
        id: pack
        shell: bash
        run: |
          set -euo pipefail
          PACKAGE_FILE="$(npm pack)"
          echo "package_file=${PACKAGE_FILE}" >> "$GITHUB_OUTPUT"

      - name: Verify packaged Node runtime
        run: node scripts/verify-node-package-runtime.mjs --package-file "${{ steps.pack.outputs.package_file }}"

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ${{ steps.pack.outputs.package_file }}
          name: v${{ steps.version.outputs.package_version }}
